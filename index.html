<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIO APP - Gestión de Producción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .pill-active { @apply bg-blue-600 text-white; }
        .pill-inactive { @apply bg-gray-200 text-gray-700 hover:bg-gray-300; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-blue-900">LIO APP</h1>
                <p class="text-gray-500 text-sm">Control de Producción y Merma</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Tipo de Acceso</label>
                    <select id="user-type" class="w-full p-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" onchange="toggleLoginFields()">
                        <option value="store">TIENDA (PIN)</option>
                        <option value="admin">MANAGEMENT (USER)</option>
                    </select>
                </div>
                
                <div id="store-fields">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Seleccionar Tienda</label>
                    <select id="store-select" class="w-full p-3 bg-gray-50 border rounded-xl mb-4"></select>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">PIN</label>
                    <input type="password" id="store-pin" inputmode="numeric" class="w-full p-3 bg-gray-50 border rounded-xl text-center text-2xl tracking-widest" placeholder="****">
                </div>

                <div id="admin-fields" class="hidden">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Usuario</label>
                    <input type="text" id="admin-user" class="w-full p-3 bg-gray-50 border rounded-xl mb-4">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Contraseña</label>
                    <input type="password" id="admin-pass" class="w-full p-3 bg-gray-50 border rounded-xl">
                </div>

                <button onclick="attemptLogin()" id="btn-login" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transform active:scale-95 transition">
                    ENTRAR AL SISTEMA
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
            <div>
                <span class="text-xs font-bold text-blue-600 block" id="role-tag">ROLE</span>
                <h2 class="font-black text-gray-800 uppercase" id="display-user-name">NAME</h2>
            </div>
            <button onclick="logout()" class="p-2 bg-gray-100 rounded-lg text-gray-500 hover:text-red-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </header>

        <nav id="nav-bar" class="bg-white border-b flex overflow-x-auto">
            <button onclick="showSection('dashboard')" class="nav-item flex-1 p-4 text-center border-b-2 border-blue-600 text-blue-600 font-bold">DASHBOARD</button>
            <button onclick="showSection('input')" id="nav-input" class="nav-item flex-1 p-4 text-center border-b-2 border-transparent text-gray-500 font-bold">REGISTRO</button>
            <button onclick="showSection('audit')" id="nav-audit" class="nav-item flex-1 p-4 text-center border-b-2 border-transparent text-gray-500 font-bold hidden">AUDITORÍA</button>
            <button onclick="showSection('admin')" id="nav-admin" class="nav-item flex-1 p-4 text-center border-b-2 border-transparent text-gray-500 font-bold hidden">ADMIN</button>
        </nav>

        <main class="flex-1 p-4 pb-24">
            
            <div id="sec-dashboard" class="section-content space-y-4">
                <div id="store-summary" class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-xs font-bold text-gray-400">MEDIA MERMA</p>
                        <p class="text-2xl font-black text-gray-800" id="stat-avg-merma">0%</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-xs font-bold text-gray-400">PENDIENTES</p>
                        <p class="text-2xl font-black text-orange-500" id="stat-pending">--</p>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4 uppercase text-sm">Top 5 Merma (Mes)</h3>
                    <canvas id="topMermaChart" height="200"></canvas>
                </div>

                <div id="manager-view" class="hidden space-y-4">
                    <h3 class="font-bold text-gray-800 uppercase text-sm">Estado de Zona</h3>
                    <div id="zone-status-list" class="space-y-2"></div>
                </div>
            </div>

            <div id="sec-input" class="section-content hidden space-y-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                    <div class="flex gap-2">
                        <input type="date" id="input-date" class="flex-1 p-3 bg-gray-50 rounded-xl border-none font-bold text-gray-700">
                        <select id="input-type" class="flex-1 p-3 bg-gray-50 rounded-xl border-none font-bold text-gray-700" onchange="updateInputUI()">
                            <option value="prod">PRODUCCIÓN</option>
                            <option value="merma">MERMA</option>
                        </select>
                    </div>
                    <select id="input-turno" class="w-full p-3 bg-blue-50 text-blue-700 rounded-xl border-none font-bold">
                        <option value="Obrador">TURNO OBRADOR (Mañana)</option>
                        <option value="Mediodía">TURNO MEDIODÍA</option>
                        <option value="Tarde">TURNO TARDE</option>
                    </select>
                </div>

                <div class="space-y-2 overflow-hidden">
                    <div id="cat-filters" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
                    <div id="subcat-filters" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
                </div>

                <div id="product-list" class="space-y-2"></div>

                <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-2">
                    <button onclick="submitData()" class="flex-1 bg-green-600 text-white font-black py-4 rounded-xl shadow-lg">GUARDAR DATOS</button>
                    <button id="btn-zero-merma" onclick="setZeroMerma()" class="hidden bg-gray-800 text-white px-6 rounded-xl font-bold">TODO 0</button>
                </div>
            </div>

            <div id="sec-audit" class="section-content hidden">
                <div class="bg-white p-4 rounded-2xl shadow-sm text-center py-20 text-gray-400 font-bold uppercase">Módulo de Auditoría Avanzada</div>
            </div>
            <div id="sec-admin" class="section-content hidden">
                <div class="bg-white p-4 rounded-2xl shadow-sm text-center py-20 text-gray-400 font-bold uppercase">Módulo de Administración de Sistema</div>
            </div>

        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby86Uyfci6i_hyunbHhVlM2XsTwpo6AtxYedAOZX8gJ6xIIn392pUUR6hxzH4hbJ3nrCA/exec";
        
        let currentUser = null;
        let masterData = { productos: [], tiendas: [], zonas: [] };
        let activeCat = "TODOS";
        let activeSubCat = "TODOS";

        window.onload = async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            await fetchInitialData();
        };

        async function fetchInitialData() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                const json = await res.json();
                if(json.status === 'success') {
                    // Limpieza de datos (Quitar cabeceras del Sheet)
                    masterData.productos = json.data.productos.slice(1);
                    masterData.tiendas = json.data.tiendas.slice(1);
                    masterData.zonas = json.data.zonas.slice(1);
                    populateSelectors();
                }
            } catch (e) { alert("Error de conexión con el servidor"); }
        }

        function populateSelectors() {
            const storeSelect = document.getElementById('store-select');
            storeSelect.innerHTML = masterData.tiendas.map(t => `<option value="${t[0]}">${t[1]} (${t[0]})</option>`).join('');
            renderFilters();
        }

        // --- SISTEMA DE LOGIN Y ROLES ---
        async function attemptLogin() {
            const btn = document.getElementById('btn-login');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const type = document.getElementById('user-type').value;
            let params = { type };
            if (type === 'store') {
                params.id = document.getElementById('store-select').value;
                params.pin = document.getElementById('store-pin').value;
            } else {
                params.user = document.getElementById('admin-user').value;
                params.pass = document.getElementById('admin-pass').value;
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', params }) });
                const json = await res.json();
                if (json.status === 'success') {
                    currentUser = json.data;
                    setupUIByRole();
                } else {
                    alert("PIN o Usuario incorrecto");
                }
            } catch (e) { alert("Error en el servidor"); }
            btn.innerText = "ENTRAR AL SISTEMA"; btn.disabled = false;
        }

        function setupUIByRole() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = currentUser.nombre || currentUser.id;
            document.getElementById('role-tag').innerText = currentUser.rol;

            if(currentUser.rol === 'STORE') {
                document.getElementById('nav-audit').classList.add('hidden');
                document.getElementById('nav-input').classList.remove('hidden');
            } else {
                document.getElementById('nav-audit').classList.remove('hidden');
                document.getElementById('manager-view').classList.remove('hidden');
                if(currentUser.rol === 'ADMIN') document.getElementById('nav-admin').classList.remove('hidden');
            }
            showSection('dashboard');
            renderProductList();
        }

        // --- SISTEMA DE FILTROS ---
        function renderFilters() {
            const cats = ["TODOS", ...new Set(masterData.productos.map(p => p[2]))];
            const catContainer = document.getElementById('cat-filters');
            catContainer.innerHTML = cats.map(c => `
                <button onclick="setCat('${c}')" class="px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm ${activeCat === c ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}">${c}</button>
            `).join('');

            const filteredProds = activeCat === "TODOS" ? masterData.productos : masterData.productos.filter(p => p[2] === activeCat);
            const subcats = ["TODOS", ...new Set(filteredProds.map(p => p[3]))];
            const subContainer = document.getElementById('subcat-filters');
            subContainer.innerHTML = subcats.map(s => `
                <button onclick="setSubCat('${s}')" class="px-4 py-1 rounded-full whitespace-nowrap font-bold text-xs ${activeSubCat === s ? 'bg-blue-400 text-white' : 'bg-gray-100 text-gray-500'}">${s}</button>
            `).join('');
        }

        function setCat(c) { activeCat = c; activeSubCat = "TODOS"; renderFilters(); renderProductList(); }
        function setSubCat(s) { activeSubCat = s; renderFilters(); renderProductList(); }

        // --- LISTA DE PRODUCTOS ---
        function renderProductList() {
            const container = document.getElementById('product-list');
            const filtered = masterData.productos.filter(p => {
                const matchCat = activeCat === "TODOS" || p[2] === activeCat;
                const matchSub = activeSubCat === "TODOS" || p[3] === activeSubCat;
                const isActive = p[4] === true || p[4] === "TRUE";
                return matchCat && matchSub && isActive;
            });

            container.innerHTML = filtered.map(p => `
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex-1">
                        <p class="font-black text-gray-800 leading-none mb-1">${p[1]}</p>
                        <p class="text-[10px] text-gray-400 uppercase font-bold">${p[3]}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="adjValue('${p[0]}', -1)" class="w-10 h-10 bg-gray-100 rounded-xl font-black text-xl text-gray-500">-</button>
                        <input type="number" id="val-${p[0]}" value="0" class="w-12 text-center font-black text-xl text-blue-600 bg-transparent border-none">
                        <button onclick="adjValue('${p[0]}', 1)" class="w-10 h-10 bg-gray-100 rounded-xl font-black text-xl text-gray-500">+</button>
                    </div>
                </div>
            `).join('');
        }

        function adjValue(id, delta) {
            const input = document.getElementById(`val-${id}`);
            input.value = Math.max(0, parseInt(input.value) + delta);
        }

        function updateInputUI() {
            const type = document.getElementById('input-type').value;
            const turnoDiv = document.getElementById('input-turno');
            const btnZero = document.getElementById('btn-zero-merma');
            
            if(type === 'merma') {
                turnoDiv.classList.add('hidden');
                btnZero.classList.remove('hidden');
            } else {
                turnoDiv.classList.remove('hidden');
                btnZero.classList.add('hidden');
            }
        }

        // --- ACCIONES DE DATOS ---
        async function submitData() {
            const items = masterData.productos.map(p => {
                const val = parseInt(document.getElementById(`val-${p[0]}`)?.value || 0);
                return { prodId: p[0], val };
            }).filter(i => i.val > 0);

            if(items.length === 0) return alert("No hay datos que guardar");

            const payload = {
                action: 'saveDaily',
                params: {
                    fecha: document.getElementById('input-date').value,
                    type: document.getElementById('input-type').value,
                    turno: document.getElementById('input-turno').value,
                    tiendaId: currentUser.id,
                    items
                }
            };

            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const json = await res.json();
            if(json.status === 'success') {
                alert("DATOS GUARDADOS");
                location.reload();
            }
        }

        function setZeroMerma() {
            if(confirm("¿Seguro que quieres marcar 0 merma en TODO?")) {
                // Implementar lógica de envío rápido masivo si fuese necesario
                alert("Simulación: Guardando día con 0 mermas...");
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(`sec-${id}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('border-blue-600', 'text-blue-600');
                n.classList.add('border-transparent', 'text-gray-500');
            });
            event.currentTarget.classList.add('border-blue-600', 'text-blue-600');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
