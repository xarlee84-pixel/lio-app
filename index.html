<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Producción y Merma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .pwa-btn {
            display: none;
        }
        @media (display-mode: browser) {
            .pwa-btn {
                display: block;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Acceso al Sistema</h2>
            <div id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="user-type">Tipo de Usuario</label>
                    <select id="user-type" class="w-full p-2 border rounded" onchange="toggleLoginFields()">
                        <option value="store">Tienda</option>
                        <option value="admin">Administración / Manager</option>
                    </select>
                </div>
                
                <div id="store-fields" class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Seleccionar Tienda</label>
                    <select id="store-select" class="w-full p-2 border rounded">
                        </select>
                    <label class="block text-gray-700 text-sm font-bold mb-2 mt-4">PIN de Acceso</label>
                    <input type="password" id="store-pin" class="w-full p-2 border rounded" placeholder="****">
                </div>

                <div id="admin-fields" class="mb-4 hidden">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Usuario</label>
                    <input type="text" id="admin-user" class="w-full p-2 border rounded">
                    <label class="block text-gray-700 text-sm font-bold mb-2 mt-4">Contraseña</label>
                    <input type="password" id="admin-pass" class="w-full p-2 border rounded">
                </div>

                <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Entrar
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-blue-800 p-4 text-white flex justify-between items-center shadow-lg">
            <div class="flex items-center">
                <span id="display-user-name" class="font-bold text-lg">Usuario</span>
            </div>
            <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition">Cerrar Sesión</button>
        </nav>

        <div class="p-4 max-w-6xl mx-auto">
            <div class="flex mb-4 space-x-2 overflow-x-auto pb-2">
                <button onclick="showTab('tab-input')" class="tab-btn bg-white px-4 py-2 rounded shadow font-bold text-blue-800">Registro Diario</button>
                <button id="nav-audit" onclick="showTab('tab-audit')" class="tab-btn bg-gray-200 px-4 py-2 rounded shadow font-bold text-gray-700">Auditoría</button>
                <button id="nav-admin" onclick="showTab('tab-admin')" class="tab-btn bg-gray-200 px-4 py-2 rounded shadow font-bold text-gray-700 hidden">Administración</button>
            </div>

            <div id="tab-input" class="tab-content">
                <div class="bg-white p-4 rounded shadow mb-4">
                    <h3 class="text-xl font-bold mb-4 border-b pb-2">Introducción de Datos</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">Fecha</label>
                            <input type="date" id="input-date" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">Operación</label>
                            <select id="input-type" class="w-full p-2 border rounded" onchange="updateUIForType()">
                                <option value="prod">Producción</option>
                                <option value="merma">Merma</option>
                            </select>
                        </div>
                        <div id="div-turno">
                            <label class="block text-sm font-bold mb-1">Turno</label>
                            <select id="input-turno" class="w-full p-2 border rounded">
                                <option value="Shift 1">Turno Mañana</option>
                                <option value="Shift 2">Turno Mediodía</option>
                                <option value="Shift 3">Turno Tarde</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="product-list" class="space-y-2">
                        <div class="p-4 text-center text-gray-500">Cargando productos...</div>
                    </div>

                    <div class="mt-6 flex space-x-2">
                        <button onclick="submitData()" class="flex-1 bg-green-600 text-white font-bold py-3 rounded shadow hover:bg-green-700">Guardar Registro</button>
                        <button id="btn-zero-merma" onclick="setZeroMerma()" class="hidden bg-gray-500 text-white px-4 py-2 rounded">Día 0 Merma</button>
                    </div>
                </div>
            </div>

            <div id="tab-audit" class="tab-content hidden">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-xl font-bold mb-4">Panel de Análisis</h3>
                    <canvas id="auditChart" class="mb-4"></canvas>
                    <div id="audit-table-container" class="overflow-x-auto">
                        </div>
                </div>
            </div>

            <div id="tab-admin" class="tab-content hidden">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-xl font-bold mb-4">Gestión del Sistema</h3>
                    <p class="text-sm text-gray-600 mb-4">Módulos para añadir productos, editar tiendas y gestionar usuarios.</p>
                    </div>
            </div>
        </div>
    </div>

    <button onclick="addToHome()" class="pwa-btn fixed bottom-4 right-4 bg-yellow-500 text-white p-3 rounded-full shadow-lg font-bold">Añadir a Pantalla</button>

    <script>
        // Configuración de la API
        const API_URL = "https://script.google.com/macros/s/AKfycby86Uyfci6i_hyunbHhVlM2XsTwpo6AtxYedAOZX8gJ6xIIn392pUUR6hxzH4hbJ3nrCA/exec";
        
        let currentUser = null;
        let masterData = { productos: [], tiendas: [], zonas: [] };

        // Inicialización
        window.onload = async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            await fetchInitialData();
        };

        async function fetchInitialData() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getInitialData' })
                });
                const json = await res.json();
                if(json.status === 'success') {
                    masterData = json.data;
                    populateSelectors();
                    renderProductInputList();
                }
            } catch (e) {
                console.error("Error al cargar datos", e);
            }
        }

        function populateSelectors() {
            const storeSelect = document.getElementById('store-select');
            storeSelect.innerHTML = masterData.tiendas.map(t => 
                `<option value="${t[0]}">${t[1]} (${t[0]})</option>`
            ).join('');
        }

        function renderProductInputList() {
            const list = document.getElementById('product-list');
            list.innerHTML = masterData.productos.filter(p => p[4] === true || p[4] === "TRUE").map(p => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded border">
                    <div class="flex-1">
                        <span class="block font-bold text-gray-800">${p[1]}</span>
                        <span class="text-xs text-gray-500">${p[2]} / ${p[3]}</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="adjValue('${p[0]}', -1)" class="w-10 h-10 bg-gray-200 rounded font-bold">-</button>
                        <input type="number" id="val-${p[0]}" value="0" min="0" class="w-16 p-2 text-center border rounded font-bold">
                        <button onclick="adjValue('${p[0]}', 1)" class="w-10 h-10 bg-gray-200 rounded font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function adjValue(id, delta) {
            const input = document.getElementById(`val-${id}`);
            input.value = Math.max(0, parseInt(input.value) + delta);
        }

        function toggleLoginFields() {
            const type = document.getElementById('user-type').value;
            document.getElementById('store-fields').classList.toggle('hidden', type !== 'store');
            document.getElementById('admin-fields').classList.toggle('hidden', type === 'store');
        }

        async function attemptLogin() {
            const type = document.getElementById('user-type').value;
            let params = { type };
            
            if (type === 'store') {
                params.id = document.getElementById('store-select').value;
                params.pin = document.getElementById('store-pin').value;
            } else {
                params.user = document.getElementById('admin-user').value;
                params.pass = document.getElementById('admin-pass').value;
            }

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', params })
            });
            const json = await res.json();
            
            if (json.status === 'success') {
                currentUser = json.data;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-user-name').innerText = currentUser.nombre || currentUser.id;
                if (currentUser.rol === 'ADMIN') document.getElementById('nav-admin').classList.remove('hidden');
            } else {
                alert("Credenciales incorrectas");
            }
        }

        async function submitData() {
            const date = document.getElementById('input-date').value;
            const type = document.getElementById('input-type').value;
            const turno = document.getElementById('input-turno').value;
            
            const items = masterData.productos.map(p => ({
                prodId: p[0],
                val: parseInt(document.getElementById(`val-${p[0]}`).value) || 0
            })).filter(i => i.val > 0);

            if(items.length === 0) return alert("Introduce algún valor");

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: 'saveDaily', 
                    params: { 
                        fecha: date, 
                        type, 
                        turno, 
                        tiendaId: currentUser.id,
                        items 
                    } 
                })
            });
            
            const json = await res.json();
            if(json.status === 'success') {
                alert("Datos guardados correctamente");
                renderProductInputList();
            }
        }

        function updateUIForType() {
            const isMerma = document.getElementById('input-type').value === 'merma';
            document.getElementById('div-turno').style.display = isMerma ? 'none' : 'block';
            document.getElementById('btn-zero-merma').classList.toggle('hidden', !isMerma);
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        function logout() {
            location.reload();
        }

        function addToHome() {
            alert("Para añadir a pantalla de inicio:\n1. Pulsa Compartir (iOS) o Menú (Android)\n2. Selecciona 'Añadir a pantalla de inicio'");
        }
    </script>
</body>
</html>
