<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Lio-Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-lio { background-color: #FFD700; color: #000; font-weight: bold; border-radius: 12px; }
        .input-lio { background-color: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; }
        .card-prod { background-color: #111; border: 1px solid #222; border-radius: 16px; }
        .pill { background-color: #222; border: 1px solid #444; padding: 6px 14px; border-radius: 20px; white-space: nowrap; font-size: 11px; cursor: pointer; }
        .pill.active { background-color: #FFD700; color: #000; font-weight: bold; }
        .sub-pill { background-color: #111; border: 1px solid #333; padding: 4px 12px; border-radius: 15px; font-size: 10px; color: #888; cursor: pointer; }
        .sub-pill.active { border-color: #FFD700; color: #FFD700; border-width: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="date"] { color-scheme: dark; }
    </style>
</head>
<body onload="cargarUsuarios()">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 text-center">
        <div class="max-w-md w-full space-y-8">
            <h1 class="text-4xl font-extrabold text-[#FFD700] tracking-tight uppercase">LIO-GESTIÓN</h1>
            <div class="space-y-4 text-left">
                <select id="user-select" class="input-lio w-full p-4 text-lg outline-none appearance-none"><option value="">Cargando sistema...</option></select>
                <input id="pin-input" type="password" pattern="[0-9]*" inputmode="numeric" placeholder="PIN" class="input-lio w-full p-4 text-center text-3xl tracking-widest outline-none">
                <button onclick="intentarLogin()" id="btn-entrar" class="btn-lio w-full p-4 text-xl uppercase tracking-widest">Entrar</button>
            </div>
            <div id="login-msg" class="text-red-500 text-sm font-bold h-6"></div>
        </div>
    </div>

    <div id="tienda-screen" class="hidden flex flex-col h-screen">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black sticky top-0 z-50">
            <div><h2 id="store-name" class="font-bold text-[#FFD700] text-lg"></h2><p id="store-zone" class="text-[10px] text-gray-500 uppercase tracking-widest"></p></div>
            <button onclick="location.reload()" class="text-[10px] bg-red-900/20 text-red-500 px-4 py-2 rounded-full border border-red-900/50 font-bold uppercase">Salir</button>
        </div>
        <div class="p-4 bg-black border-b border-gray-900 space-y-3">
            <div class="flex gap-2"><input type="date" id="input-fecha" class="input-lio flex-1 p-3 text-sm"><select id="select-tipo" onchange="toggleTurnos()" class="input-lio flex-1 p-3 text-sm"><option value="PRODUCCIÓN">PRODUCCIÓN</option><option value="MERMA">MERMA</option></select></div>
            <div id="container-turnos" class="flex gap-2">
                <button onclick="setTurno('Obrador')" class="turno-btn flex-1 p-3 rounded-xl text-[10px] font-bold border border-gray-800 uppercase">Obrador</button>
                <button onclick="setTurno('Mediodía')" class="turno-btn flex-1 p-3 rounded-xl text-[10px] font-bold border border-gray-800 uppercase">Mediodía</button>
                <button onclick="setTurno('Tarde')" class="turno-btn flex-1 p-3 rounded-xl text-[10px] font-bold border border-gray-800 uppercase">Tarde</button>
            </div>
        </div>
        <div class="p-4 space-y-3 bg-black">
            <input type="text" id="busqueda" oninput="renderProductos()" placeholder="Buscar producto..." class="input-lio w-full p-4 rounded-xl text-sm outline-none">
            <div id="lista-categorias" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar"></div>
            <div id="lista-subcategorias" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar h-8"></div>
        </div>
        <div id="lista-productos" class="flex-grow overflow-y-auto p-4 space-y-3 pb-32"></div>
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black to-transparent"><button onclick="enviarDatos()" id="btn-enviar" class="btn-lio w-full py-5 text-xl">GUARDAR REGISTROS</button></div>
    </div>

    <div id="am-screen" class="hidden flex flex-col h-screen relative">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black">
            <div><h2 class="font-bold text-[#FFD700] text-lg">Panel de Zona</h2><p id="am-info" class="text-[10px] text-gray-500 uppercase"></p></div>
            <button onclick="location.reload()" class="text-[10px] bg-gray-800 px-4 py-2 rounded-full border border-gray-700 font-bold uppercase">Cerrar</button>
        </div>
        <div id="am-lista-tiendas" class="flex-grow overflow-y-auto p-4 space-y-4 pb-10"></div>

        <div id="modal-detalle" class="hidden fixed inset-0 bg-black/95 z-[100] p-6 flex flex-col">
            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                <div><h3 id="detalle-titulo" class="text-2xl font-bold text-[#FFD700]"></h3><p class="text-[10px] text-gray-500 uppercase">Top 5 Mermas (15 días)</p></div>
                <button onclick="cerrarDetalle()" class="text-2xl font-light text-gray-400">&times;</button>
            </div>
            <div id="detalle-contenido" class="space-y-4 flex-grow overflow-y-auto"></div>
            <button onclick="cerrarDetalle()" class="btn-lio w-full py-4 mt-6">VOLVER</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHTg2_WBm4n5Dyy0lpwDnGxW33kpvSTaH4l363A-XpTfgymuxaq7TctXt7HsDbbPaJIg/exec"; 

        let PRODUCTOS = []; let FILTROS = []; let VALORES = {}; let USUARIO = null;
        let CAT_ACTIVA = "TODOS"; let SUB_ACTIVA = "TODOS"; let TURNO_ACTIVO = "Obrador";

        async function fetchAPI(action, extra = {}) {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, ...extra }) });
            return await res.json();
        }

        function cargarUsuarios() {
            fetchAPI('get_users').then(res => {
                const s = document.getElementById('user-select');
                if (res.success) {
                    s.innerHTML = '<option value="">-- Selecciona Usuario --</option>';
                    res.usuarios.forEach(u => { s.innerHTML += `<option value="${u.id}">${u.nombre}</option>`; });
                }
            });
        }

        function intentarLogin() {
            const id = document.getElementById('user-select').value; const pin = document.getElementById('pin-input').value;
            if(!id || !pin) return;
            document.getElementById('btn-entrar').innerText = "CONECTANDO...";
            fetchAPI('verificar_pin', { userId: id, pin: pin }).then(res => {
                if(res.success) {
                    USUARIO = res.usuario; document.getElementById('login-screen').classList.add('hidden');
                    if (USUARIO.rol === 'AM' || USUARIO.rol === 'ADMIN') mostrarPanelAM(); else mostrarPanelTienda();
                } else { document.getElementById('login-msg').innerText = res.msg; document.getElementById('btn-entrar').innerText = "Entrar"; }
            });
        }

        function mostrarPanelTienda() {
            document.getElementById('tienda-screen').classList.remove('hidden');
            document.getElementById('store-name').innerText = USUARIO.nombre;
            document.getElementById('store-zone').innerText = USUARIO.zona;
            document.getElementById('input-fecha').valueAsDate = new Date();
            setTurno('Obrador');
            fetchAPI('get_catalog').then(res => { if(res.success) { PRODUCTOS = res.productos; FILTROS = res.filtros; renderCategorias(); renderProductos(); } });
        }

        function mostrarPanelAM() {
            document.getElementById('am-screen').classList.remove('hidden');
            document.getElementById('am-info').innerText = `${USUARIO.nombre} | ${USUARIO.zona}`;
            const cont = document.getElementById('am-lista-tiendas');
            cont.innerHTML = '<p class="text-center text-gray-500 mt-10 animate-pulse">Analizando zona...</p>';
            fetchAPI('get_am_report', { rol: USUARIO.rol, zona: USUARIO.zona }).then(res => {
                if(res.success) {
                    cont.innerHTML = "";
                    res.reporte.forEach(t => {
                        const crit = t.pendientes > 0;
                        cont.innerHTML += `
                            <div onclick="verDetalle('${t.id}', '${t.nombre}')" class="card-prod p-5 border-l-4 ${crit ? 'border-red-600' : 'border-green-500'} active:scale-95 transition-transform">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-xl tracking-tight">${t.nombre}</h3>
                                    <span class="text-[10px] font-black px-3 py-1 rounded-full ${crit ? 'bg-red-900/20 text-red-500' : 'bg-green-900/20 text-green-500'}">${crit ? 'PENDIENTE' : 'AL DÍA'}</span>
                                </div>
                                <div class="mt-3 text-xs text-gray-400">
                                    ${crit ? 'Faltan <b>'+t.pendientes+'</b> tareas' : 'Operativa al día'}
                                    ${crit ? '<p class="text-[10px] text-red-400/80 mt-1 italic">'+t.faltas.join(', ')+'...</p>' : ''}
                                </div>
                                <div class="grid grid-cols-2 gap-4 mt-5 pt-4 border-t border-gray-800">
                                    <div><p class="text-[9px] text-gray-500 uppercase font-bold">Ratio Merma</p><p class="text-2xl font-black text-[#FFD700]">${t.ratio}%</p></div>
                                    <div class="text-right"><p class="text-[9px] text-gray-500 uppercase font-bold">Ranking</p><p class="text-2xl font-black text-white">#${t.puesto}<span class="text-xs text-gray-600 ml-1">/ ${t.totalTiendas}</span></p></div>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        async function verDetalle(id, nombre) {
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.getElementById('detalle-titulo').innerText = nombre;
            const c = document.getElementById('detalle-contenido'); c.innerHTML = '<p class="text-center text-gray-600 mt-10">Cargando...</p>';
            const res = await fetchAPI('get_store_detail', { tiendaId: id });
            if(res.success) {
                c.innerHTML = res.ranking.length ? "" : '<p class="text-center text-gray-600 mt-10">Sin mermas.</p>';
                res.ranking.forEach(p => { c.innerHTML += `<div class="flex justify-between p-4 bg-white/5 rounded-xl border border-white/10"><span class="font-bold text-gray-100">${p.nombre}</span><span class="text-[#FFD700] font-black">${p.total} ud.</span></div>`; });
            }
        }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function setTurno(t) { TURNO_ACTIVO = t; document.querySelectorAll('.turno-btn').forEach(b => { const a = b.innerText === t.toUpperCase(); b.style.backgroundColor = a ? "#FFD700" : "#111"; b.style.color = a ? "#000" : "#fff"; }); }
        function toggleTurnos() { const t = document.getElementById('select-tipo').value; document.getElementById('container-turnos').style.display = (t === "MERMA") ? 'none' : 'flex'; TURNO_ACTIVO = (t === "MERMA") ? "Noche" : "Obrador"; if(t === "PRODUCCIÓN") setTurno('Obrador'); }
        function renderCategorias() { const c = document.getElementById('lista-categorias'); c.innerHTML = `<div onclick="setCat('TODOS')" class="pill ${CAT_ACTIVA === 'TODOS' ? 'active' : ''}">TODOS</div>`; FILTROS.forEach(f => { c.innerHTML += `<div onclick="setCat('${f.nombre}')" class="pill ${CAT_ACTIVA === f.nombre ? 'active' : ''}">${f.nombre}</div>`; }); renderSubcategorias(); }
        function renderSubcategorias() { const c = document.getElementById('lista-subcategorias'); c.innerHTML = ""; if (CAT_ACTIVA === "TODOS") return; const catD = FILTROS.find(f => f.nombre === CAT_ACTIVA); if (catD) { c.innerHTML = `<div onclick="setSub('TODOS')" class="sub-pill ${SUB_ACTIVA === 'TODOS' ? 'active' : ''}">TODAS</div>`; catD.subcategorias.forEach(s => { c.innerHTML += `<div onclick="setSub('${s}')" class="sub-pill ${SUB_ACTIVA === s ? 'active' : ''}">${s}</div>`; }); } }
        function renderProductos() { const c = document.getElementById('lista-productos'); const b = document.getElementById('busqueda').value.toLowerCase(); c.innerHTML = ""; PRODUCTOS.filter(p => (CAT_ACTIVA === "TODOS" || p.categoria === CAT_ACTIVA) && (SUB_ACTIVA === "TODOS" || p.subcategoria === SUB_ACTIVA) && p.nombre.toLowerCase().includes(b)).forEach(p => { const cant = VALORES[p.id] || 0; c.innerHTML += `<div class="card-prod p-4 flex items-center justify-between"><div class="flex-1 pr-4"><h3 class="font-bold text-sm text-gray-200">${p.nombre}</h3><p class="text-[11px] text-[#FFD700] font-bold mt-1 uppercase">${p.subcategoria}</p></div><div class="flex items-center bg-black/50 rounded-full p-1 border border-gray-800"><button onclick="updateCant('${p.id}', -1)" class="w-10 h-10 rounded-full bg-gray-900 text-xl font-bold">-</button><input type="number" value="${cant}" onchange="setCant('${p.id}', this.value)" class="w-10 bg-transparent text-center text-lg font-bold text-[#FFD700] outline-none"><button onclick="updateCant('${p.id}', 1)" class="w-10 h-10 rounded-full btn-lio text-xl">+</button></div></div>`; }); }
        function updateCant(id, d) { VALORES[id] = Math.max(0, (VALORES[id] || 0) + d); renderProductos(); }
        function setCant(id, v) { VALORES[id] = Math.max(0, parseInt(v) || 0); }
        function setCat(c) { CAT_ACTIVA = c; SUB_ACTIVA = "TODOS"; renderCategorias(); renderProductos(); }
        function setSub(s) { SUB_ACTIVA = s; renderSubcategorias(); renderProductos(); }
        function enviarDatos() { const b = document.getElementById('btn-enviar'); const its = Object.keys(VALORES).map(id => ({ id, cantidad: VALORES[id] })).filter(i => i.cantidad > 0); if(!its.length) return alert("Sin datos"); b.disabled = true; b.innerText = "GUARDANDO..."; fetchAPI('save_records', { payload: { tiendaId: USUARIO.id, fecha: document.getElementById('input-fecha').value, tipo: document.getElementById('select-tipo').value, turno: TURNO_ACTIVO, items: its } }).then(res => { if(res.success) { alert("¡Guardado!"); VALORES = {}; renderProductos(); } b.disabled = false; b.innerText = "GUARDAR REGISTROS"; }); }
    </script>
</body>
</html>
