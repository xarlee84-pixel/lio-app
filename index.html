<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lio-Gestión App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { black: '#000000', yellow: '#FFD700', gray: '#1F2937' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 4px solid #1F2937; border-top: 4px solid #FFD700; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden">

    <div id="loadingOverlay" class="fixed inset-0 bg-brand-black bg-opacity-90 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p id="loadingText" class="text-brand-yellow font-semibold">Conectando con Lio-Gestión...</p>
    </div>

    <div id="viewLogin" class="hidden flex-1 flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl font-bold text-brand-yellow mb-8 tracking-tighter">LIAOPASTEL</h1>
        <div class="w-full max-w-sm bg-brand-gray p-6 rounded-xl shadow-2xl">
            <label class="block text-sm text-gray-400 mb-2">Selecciona tu Usuario</label>
            <select id="loginUserSelect" class="w-full bg-black border border-gray-600 rounded-lg p-3 text-white mb-6 focus:border-brand-yellow outline-none appearance-none">
                <option value="">Cargando usuarios...</option>
            </select>
            
            <label class="block text-sm text-gray-400 mb-2">PIN de Acceso</label>
            <input type="password" id="loginPin" pattern="[0-9]*" inputmode="numeric" class="w-full bg-black border border-gray-600 rounded-lg p-3 text-white text-center text-2xl tracking-[0.5em] mb-6 focus:border-brand-yellow outline-none" placeholder="••••">
            
            <button onclick="ejecutarLogin()" class="w-full bg-brand-yellow text-black font-bold py-4 rounded-lg text-lg uppercase tracking-wide hover:bg-yellow-500 transition-colors">
                Entrar al Sistema
            </button>
        </div>
    </div>

    <nav id="mainNav" class="hidden bg-brand-gray border-b border-gray-800 p-4 flex justify-between items-center shrink-0">
        <div class="font-bold text-brand-yellow text-xl tracking-tighter">LIAO<span class="text-white">GESTIÓN</span></div>
        <div class="flex items-center gap-4">
            <span id="navUserName" class="text-sm text-gray-300"></span>
            <button onclick="cerrarSesion()" class="text-xs bg-red-600/20 text-red-500 px-3 py-1 rounded">Salir</button>
        </div>
    </nav>

    <div id="tabsTienda" class="hidden bg-brand-black flex border-b border-gray-800 shrink-0">
        <button onclick="cambiarTab('produccion')" id="tab-produccion" class="flex-1 py-3 text-sm font-semibold border-b-2 border-brand-yellow text-brand-yellow transition-colors">PRODUCCIÓN</button>
        <button onclick="cambiarTab('merma')" id="tab-merma" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-500 transition-colors">MERMA</button>
        <button onclick="cambiarTab('dashboard')" id="tab-dashboard" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-500 transition-colors">DASHBOARD</button>
    </div>

    <div id="mainContent" class="hidden flex-1 overflow-y-auto hide-scrollbar bg-brand-black p-4 pb-24">
        
        <div id="secRegistro" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="tituloRegistro" class="text-xl font-bold text-white">Registro</h2>
                <input type="date" id="fechaRegistro" class="bg-brand-gray border border-gray-700 text-white p-2 rounded text-sm outline-none">
            </div>

            <div class="flex overflow-x-auto hide-scrollbar gap-2 mb-6" id="filtroCategorias">
                </div>

            <div id="listaProductos" class="space-y-4">
                </div>

            <button onclick="guardarDatosRegistro()" class="fixed bottom-6 left-4 right-4 bg-brand-yellow text-black font-bold py-4 rounded-xl text-lg uppercase shadow-[0_0_20px_rgba(255,215,0,0.3)] z-40">
                Guardar Datos
            </button>
        </div>

        <div id="secDashboard" class="hidden space-y-6">
            
            <div id="panelAlertas" class="hidden bg-brand-gray rounded-xl p-4 border border-gray-700">
                <h3 class="text-brand-yellow font-bold mb-3 flex items-center gap-2">⚠️ Estado de Tiendas (Hoy)</h3>
                <div id="listaAlertas" class="grid grid-cols-2 gap-2 text-sm">
                    </div>
            </div>

            <div class="bg-brand-gray rounded-xl p-4 border border-gray-700 grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs text-gray-400 mb-1">Tienda</label>
                    <select id="filtroDashTienda" class="w-full bg-black text-white p-2 rounded border border-gray-600 text-sm outline-none" onchange="cargarDashboard()"></select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Desde</label>
                    <input type="date" id="filtroDashInicio" class="w-full bg-black text-white p-2 rounded border border-gray-600 text-sm outline-none" onchange="cargarDashboard()">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Hasta</label>
                    <input type="date" id="filtroDashFin" class="w-full bg-black text-white p-2 rounded border border-gray-600 text-sm outline-none" onchange="cargarDashboard()">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-brand-gray rounded-xl p-4 border border-gray-700 flex flex-col justify-center items-center">
                    <span class="text-gray-400 text-xs uppercase tracking-wide">Producción Total</span>
                    <span id="kpiProduccion" class="text-2xl font-bold text-white mt-1">0</span>
                </div>
                <div class="bg-brand-gray rounded-xl p-4 border border-red-900 flex flex-col justify-center items-center">
                    <span class="text-red-400 text-xs uppercase tracking-wide">Merma Total</span>
                    <span id="kpiMerma" class="text-2xl font-bold text-red-500 mt-1">0</span>
                </div>
            </div>

            <div class="bg-brand-gray rounded-xl p-4 border border-gray-700">
                <h3 class="text-sm font-bold text-gray-300 mb-4">Top 5 Mermas</h3>
                <canvas id="chartMerma"></canvas>
            </div>

            <div class="bg-brand-gray rounded-xl p-4 border border-gray-700 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-gray-300">Detalle de Registros</h3>
                    <button onclick="exportarCSV()" class="text-xs bg-brand-yellow text-black px-3 py-1 rounded font-bold">⬇ CSV</button>
                </div>
                <div class="overflow-x-auto hide-scrollbar">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="text-gray-400 border-b border-gray-700">
                            <tr>
                                <th class="pb-2 pr-4">Fecha</th>
                                <th class="pb-2 pr-4">Producto</th>
                                <th class="pb-2 pr-4">Tipo</th>
                                <th class="pb-2 text-right">Cant.</th>
                            </tr>
                        </thead>
                        <tbody id="tablaDetalle" class="text-white divide-y divide-gray-800">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL ---
        const State = {
            usuario: null, // {id, nombre, rol}
            catalogo: [],
            entidades: [],
            modoActual: 'produccion', // produccion, merma, dashboard
            datosInput: {}, // { idProducto: { obrador: 0, mediodia: 0, tarde: 0, unico: 0 } }
            dashData: null,
            chartInstance: null
        };

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fechaRegistro').valueAsDate = new Date();
            let inicioMes = new Date();
            inicioMes.setDate(1);
            document.getElementById('filtroDashInicio').valueAsDate = inicioMes;
            document.getElementById('filtroDashFin').valueAsDate = new Date();

            mostrarLoader('Cargando sistema...');
            google.script.run
                .withSuccessHandler(entidades => {
                    State.entidades = entidades;
                    const select = document.getElementById('loginUserSelect');
                    select.innerHTML = '<option value="">Selecciona...</option>' + 
                        entidades.map(e => `<option value="${e.id}">${e.nombre} (${e.rol})</option>`).join('');
                    ocultarLoader();
                    document.getElementById('viewLogin').classList.remove('hidden');
                })
                .withFailureHandler(err => alertCritico(err))
                .obtenerEntidadesActivas();
        });

        // --- UTILIDADES ---
        function mostrarLoader(texto) {
            document.getElementById('loadingText').innerText = texto;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        function ocultarLoader() { document.getElementById('loadingOverlay').classList.add('hidden'); }
        function alertCritico(err) { ocultarLoader(); alert("Error crítico del sistema: " + err); }

        // --- AUTENTICACIÓN ---
        function ejecutarLogin() {
            const id = document.getElementById('loginUserSelect').value;
            const pin = document.getElementById('loginPin').value;
            if(!id || !pin) return alert("Selecciona usuario e introduce el PIN.");

            mostrarLoader('Validando credenciales...');
            google.script.run
                .withSuccessHandler(res => {
                    if(res.exito) {
                        State.usuario = res;
                        document.getElementById('navUserName').innerText = res.nombre;
                        document.getElementById('viewLogin').classList.add('hidden');
                        document.getElementById('mainNav').classList.remove('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                        
                        cargarCatalogoCore(); // Cargar productos
                    } else {
                        ocultarLoader();
                        alert("Acceso denegado: " + res.error);
                    }
                })
                .withFailureHandler(err => alertCritico(err))
                .validarLogin(id, pin);
        }

        function cerrarSesion() { location.reload(); }

        // --- FLUJO PRINCIPAL POST-LOGIN ---
        function cargarCatalogoCore() {
            mostrarLoader('Descargando catálogo...');
            google.script.run
                .withSuccessHandler(productos => {
                    State.catalogo = productos;
                    prepararInterfazSegunRol();
                    ocultarLoader();
                })
                .withFailureHandler(err => alertCritico(err))
                .obtenerCatalogo();
        }

        function prepararInterfazSegunRol() {
            if (State.usuario.rol === 'Tienda') {
                document.getElementById('tabsTienda').classList.remove('hidden');
                cambiarTab('produccion');
            } else if (State.usuario.rol === 'AM' || State.usuario.rol === 'Admin') {
                // AM y Admin van directo al Dashboard
                document.getElementById('secRegistro').classList.add('hidden');
                document.getElementById('secDashboard').classList.remove('hidden');
                document.getElementById('panelAlertas').classList.remove('hidden'); // Solo AM ve alertas visuales rápidas
                
                // Llenar select de tiendas en Dashboard
                const selectDash = document.getElementById('filtroDashTienda');
                selectDash.innerHTML = '<option value="Todas">Todas mis tiendas</option>' + 
                    State.entidades.filter(e => e.rol === 'Tienda').map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
                
                cargarDashboard();
            }
        }

        // --- LÓGICA DE UI (TIENDA) ---
        function cambiarTab(tab) {
            State.modoActual = tab;
            // Estilos de tabs
            ['produccion', 'merma', 'dashboard'].forEach(t => {
                const el = document.getElementById('tab-' + t);
                if(t === tab) {
                    el.classList.replace('border-transparent', 'border-brand-yellow');
                    el.classList.replace('text-gray-500', 'text-brand-yellow');
                } else {
                    el.classList.replace('border-brand-yellow', 'border-transparent');
                    el.classList.replace('text-brand-yellow', 'text-gray-500');
                }
            });

            const secRegistro = document.getElementById('secRegistro');
            const secDashboard = document.getElementById('secDashboard');

            if (tab === 'dashboard') {
                secRegistro.classList.add('hidden');
                secDashboard.classList.remove('hidden');
                
                const selectDash = document.getElementById('filtroDashTienda');
                selectDash.innerHTML = `<option value="${State.usuario.id}">${State.usuario.nombre}</option>`;
                selectDash.disabled = true; // Tienda no puede cambiar filtro de tienda
                
                cargarDashboard();
            } else {
                secDashboard.classList.add('hidden');
                secRegistro.classList.remove('hidden');
                document.getElementById('tituloRegistro').innerText = tab === 'produccion' ? 'Producción del Día' : 'Merma del Día';
                renderizarFormulario();
            }
        }

        function renderizarFormulario(categoriaFiltro = 'Todas') {
            State.datosInput = {}; // Reset local state
            
            // Extraer categorías únicas
            const categorias = ['Todas', ...new Set(State.catalogo.map(p => p.categoria))];
            
            // Renderizar Filtros
            document.getElementById('filtroCategorias').innerHTML = categorias.map(c => 
                `<button onclick="renderizarFormulario('${c}')" class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap ${c === categoriaFiltro ? 'bg-brand-yellow text-black' : 'bg-gray-800 text-gray-400'}">${c}</button>`
            ).join('');

            // Filtrar productos
            const prodFiltrados = categoriaFiltro === 'Todas' ? State.catalogo : State.catalogo.filter(p => p.categoria === categoriaFiltro);

            // Renderizar Cards
            const container = document.getElementById('listaProductos');
            container.innerHTML = prodFiltrados.map(p => {
                State.datosInput[p.id] = { obrador: 0, mediodia: 0, tarde: 0, unico: 0 };
                
                let inputsHTML = '';
                if (State.modoActual === 'produccion') {
                    inputsHTML = ['obrador', 'mediodia', 'tarde'].map(turno => `
                        <div class="flex flex-col items-center">
                            <span class="text-[10px] text-gray-500 uppercase">${turno}</span>
                            <div class="flex items-center bg-black rounded border border-gray-700 mt-1">
                                <button onclick="modificarCantidad('${p.id}', '${turno}', -1)" class="w-10 h-10 text-xl text-brand-yellow">-</button>
                                <input type="number" id="inp_${p.id}_${turno}" value="0" readonly class="w-10 h-10 bg-transparent text-center text-white font-bold outline-none border-x border-gray-700">
                                <button onclick="modificarCantidad('${p.id}', '${turno}', 1)" class="w-10 h-10 text-xl text-brand-yellow">+</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    inputsHTML = `
                        <div class="flex flex-col items-end w-full">
                            <span class="text-[10px] text-red-500 uppercase">Cantidad Total</span>
                            <div class="flex items-center bg-black rounded border border-red-900 mt-1">
                                <button onclick="modificarCantidad('${p.id}', 'unico', -1)" class="w-12 h-12 text-2xl text-red-500">-</button>
                                <input type="number" id="inp_${p.id}_unico" value="0" readonly class="w-16 h-12 bg-transparent text-center text-white text-lg font-bold outline-none border-x border-red-900">
                                <button onclick="modificarCantidad('${p.id}', 'unico', 1)" class="w-12 h-12 text-2xl text-red-500">+</button>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="bg-brand-gray p-4 rounded-xl border border-gray-800 flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-white text-sm">${p.nombre}</h4>
                                <span class="text-xs text-gray-500">${p.subcategoria || ''}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end gap-2">
                            ${inputsHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function modificarCantidad(idProducto, turno, delta) {
            let actual = State.datosInput[idProducto][turno];
            let nuevo = actual + delta;
            if (nuevo < 0) nuevo = 0;
            State.datosInput[idProducto][turno] = nuevo;
            document.getElementById(`inp_${idProducto}_${turno}`).value = nuevo;
        }

        // --- ENVÍO DE DATOS A BACKEND ---
        function guardarDatosRegistro() {
            const fechaStr = document.getElementById('fechaRegistro').value;
            if(!fechaStr) return alert("Selecciona una fecha válida.");

            // Validar restricción de 7 días
            const fechaElegida = new Date(fechaStr);
            const hoy = new Date();
            const diffTime = Math.abs(hoy - fechaElegida);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            if(diffDays > 7) return alert("No puedes insertar/editar datos con más de 7 días de antigüedad.");

            let movimientos = [];
            const tipoMov = State.modoActual === 'produccion' ? 'Producción' : 'Merma';

            for (const [idProd, turnos] of Object.entries(State.datosInput)) {
                if (State.modoActual === 'produccion') {
                    if (turnos.obrador > 0) movimientos.push({fecha: fechaStr, idTienda: State.usuario.id, idProducto: idProd, tipo: tipoMov, turno: 'Obrador', cantidad: turnos.obrador});
                    if (turnos.mediodia > 0) movimientos.push({fecha: fechaStr, idTienda: State.usuario.id, idProducto: idProd, tipo: tipoMov, turno: 'Mediodia', cantidad: turnos.mediodia});
                    if (turnos.tarde > 0) movimientos.push({fecha: fechaStr, idTienda: State.usuario.id, idProducto: idProd, tipo: tipoMov, turno: 'Tarde', cantidad: turnos.tarde});
                } else {
                    if (turnos.unico > 0) movimientos.push({fecha: fechaStr, idTienda: State.usuario.id, idProducto: idProd, tipo: tipoMov, turno: 'Unico', cantidad: turnos.unico});
                }
            }

            if(movimientos.length === 0) return alert("No hay cantidades mayores a 0 para guardar.");

            mostrarLoader('Cifrando y guardando en Sheets...');
            google.script.run
                .withSuccessHandler(res => {
                    ocultarLoader();
                    if(res.exito) {
                        alert("✅ Datos guardados correctamente.");
                        renderizarFormulario(); // Reset inputs
                    } else {
                        alert("❌ Error: " + res.error);
                    }
                })
                .withFailureHandler(err => alertCritico(err))
                .guardarMovimientos(movimientos);
        }

        // --- DASHBOARD Y ANÁLISIS ---
        function cargarDashboard() {
            const filtros = {
                tienda: document.getElementById('filtroDashTienda').value,
                fechaInicio: document.getElementById('filtroDashInicio').value,
                fechaFin: document.getElementById('filtroDashFin').value
            };

            mostrarLoader('Analizando datos...');
            google.script.run
                .withSuccessHandler(data => {
                    State.dashData = data;
                    renderizarDashboard(data);
                    ocultarLoader();
                })
                .withFailureHandler(err => alertCritico(err))
                .obtenerDatosDashboard(State.usuario.id, State.usuario.rol, filtros);
        }

        function renderizarDashboard(data) {
            // KPIs
            document.getElementById('kpiProduccion').innerText = data.produccionGlobal.toLocaleString();
            document.getElementById('kpiMerma').innerText = data.mermaGlobal.toLocaleString();

            // Tareas Pendientes (Solo util si es AM)
            if (State.usuario.rol === 'AM' || State.usuario.rol === 'Admin') {
                const htmlAlertas = Object.entries(data.tareasPendientes).map(([idT, estado]) => {
                    let nombreT = State.entidades.find(e => e.id === idT)?.nombre || idT;
                    let prodColor = estado.prod ? 'text-green-500' : 'text-red-500';
                    let mermaColor = estado.merma ? 'text-green-500' : 'text-red-500';
                    return `
                        <div class="bg-black p-2 rounded border border-gray-800 flex justify-between items-center">
                            <span class="text-white truncate">${nombreT}</span>
                            <div class="flex gap-2">
                                <span class="${prodColor}" title="Producción">P: ${estado.prod ? '✓' : '✗'}</span>
                                <span class="${mermaColor}" title="Merma">M: ${estado.merma ? '✓' : '✗'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('listaAlertas').innerHTML = htmlAlertas || '<span class="text-gray-500">No hay tiendas asignadas.</span>';
            }

            // Mapear nombres de productos para gráfico y tabla
            const getNombreProd = (id) => State.catalogo.find(p => p.id === id)?.nombre || id;

            // Gráfico Chart.js
            const ctx = document.getElementById('chartMerma').getContext('2d');
            if(State.chartInstance) State.chartInstance.destroy();
            
            State.chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.top5Mermas.map(item => getNombreProd(item.idProducto)),
                    datasets: [{
                        label: 'Unidades Desperdiciadas',
                        data: data.top5Mermas.map(item => item.cantidad),
                        backgroundColor: '#ef4444',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#374151' }, ticks: { color: '#9CA3AF' } },
                        x: { grid: { display: false }, ticks: { color: '#9CA3AF', maxRotation: 45, minRotation: 45 } }
                    }
                }
            });

            // Tabla Detalle
            document.getElementById('tablaDetalle').innerHTML = data.tablaDinamica.map(row => {
                const dateObj = new Date(row.fecha);
                const formatFecha = `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth()+1).padStart(2, '0')}`;
                const colorTipo = row.tipo === 'Merma' ? 'text-red-400' : 'text-brand-yellow';
                return `
                    <tr>
                        <td class="py-2 pr-4 text-gray-400">${formatFecha}</td>
                        <td class="py-2 pr-4 truncate max-w-[120px]">${getNombreProd(row.idProd)}</td>
                        <td class="py-2 pr-4 ${colorTipo}">${row.tipo}</td>
                        <td class="py-2 text-right font-bold">${row.cantidad}</td>
                    </tr>
                `;
            }).join('');
        }

        // --- EXPORTACIÓN ---
        function exportarCSV() {
            if(!State.dashData || State.dashData.tablaDinamica.length === 0) return alert("No hay datos para exportar.");
            
            let csvContent = "data:text/csv;charset=utf-8,Fecha,Tienda,Producto,Tipo,Cantidad\n";
            State.dashData.tablaDinamica.forEach(row => {
                const nomTienda = State.entidades.find(e => e.id === row.idTienda)?.nombre || row.idTienda;
                const nomProd = State.catalogo.find(p => p.id === row.idProd)?.nombre || row.idProd;
                // Escapar comillas dobles si las hay en el nombre del producto
                const escProd = `"${nomProd.replace(/"/g, '""')}"`;
                csvContent += `${row.fecha.split('T')[0]},"${nomTienda}",${escProd},${row.tipo},${row.cantidad}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `LioGestion_Export_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
