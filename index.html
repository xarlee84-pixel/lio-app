<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIO APP - Sistema de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Solución 1: Límites visuales estrictos para los botones (Galletas) */
        .pill-selected { 
            @apply bg-blue-600 text-white shadow-md scale-105 border-2 border-blue-600 transition-all; 
        }
        .pill-default { 
            @apply bg-white text-gray-700 shadow-sm border-2 border-gray-300 hover:border-blue-400 hover:text-blue-600 transition-all; 
        }
        
        /* Solución 2: Eliminación forzada de flechas en input type="number" */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] { 
            -moz-appearance: textfield; 
        }

        .tab-active { @apply border-blue-600 text-blue-600 font-black; }
        .tab-inactive { @apply border-transparent text-gray-400 font-bold; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans antialiased">

    <div id="loading" class="hidden fixed inset-0 bg-white/80 z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-blue-900 uppercase tracking-widest text-xs">Procesando...</p>
    </div>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-5xl font-black text-slate-900 italic tracking-tighter">LIO</h1>
                <div class="h-1 w-12 bg-blue-600 mx-auto mt-2 rounded-full"></div>
            </div>

            <div class="space-y-4">
                <select id="user-type" onchange="toggleLoginUI()" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold text-gray-700 outline-none focus:ring-blue-600 transition-all">
                    <option value="store">ACCESO TIENDA</option>
                    <option value="admin">ACCESO MANAGEMENT</option>
                </select>

                <div id="group-store" class="space-y-4">
                    <select id="store-select" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold text-gray-700 outline-none"></select>
                    <input type="password" id="store-pin" inputmode="numeric" placeholder="PIN TIENDA" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 text-center text-3xl font-black tracking-[0.5em] outline-none focus:ring-blue-600">
                </div>

                <div id="group-admin" class="hidden space-y-4">
                    <input type="text" id="admin-user" placeholder="USUARIO" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold outline-none">
                    <input type="password" id="admin-pass" placeholder="CONTRASEÑA" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold outline-none">
                </div>

                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all text-sm uppercase tracking-widest">Entrar al Sistema</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        
        <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <div>
                <p id="role-display" class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1"></p>
                <h2 id="user-display" class="font-black text-lg text-slate-800 uppercase italic leading-none"></h2>
            </div>
            <button onclick="location.reload()" class="bg-gray-50 p-3 rounded-2xl text-gray-400 hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </header>

        <nav id="app-nav" class="bg-white border-b flex justify-around font-black text-[10px] uppercase tracking-wider sticky top-[73px] z-40"></nav>

        <main class="flex-1 p-4 overflow-y-auto max-w-4xl mx-auto w-full">
            
            <div id="content-area">
                
                <section id="sec-dash" class="app-section space-y-6">
                    <div id="dash-widgets" class="grid grid-cols-2 gap-4"></div>
                    <div id="dash-main-content" class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100"></div>
                </section>

                <section id="sec-input" class="app-section hidden space-y-6 pb-32">
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex gap-2">
                        <input type="date" id="input-date" class="flex-1 font-bold text-slate-700 outline-none bg-transparent">
                        <select id="input-type" onchange="updateInputView()" class="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl font-black text-xs border-none outline-none">
                            <option value="prod">PRODUCCIÓN</option>
                            <option value="merma">MERMA</option>
                        </select>
                    </div>

                    <div id="area-turno" class="bg-white p-4 rounded-3xl border border-blue-100">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-3 ml-2">Seleccionar Turno</p>
                        <select id="input-turno" class="w-full font-bold text-slate-800 outline-none bg-transparent">
                            <option value="Obrador">OBRADOR (Obligatorio)</option>
                            <option value="Mediodía">REPOSICIÓN MEDIODÍA</option>
                            <option value="Tarde">REPOSICIÓN TARDE</option>
                        </select>
                    </div>

                    <div class="space-y-4">
                        <div id="pill-cats" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 px-1"></div>
                        <div id="pill-subs" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 px-1 hidden"></div>
                    </div>

                    <div id="prod-grid" class="space-y-3"></div>

                    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-white via-white to-transparent z-50 pointer-events-none">
                        <button onclick="processSave()" class="w-full max-w-4xl mx-auto block bg-slate-900 text-white font-black py-5 rounded-3xl shadow-2xl active:scale-95 transition-all text-sm uppercase tracking-widest pointer-events-auto">Confirmar Envío de Datos</button>
                    </div>
                </section>

                <section id="sec-audit" class="app-section hidden">
                    <div class="bg-white p-8 rounded-[2rem] text-center text-gray-400 font-bold">MÓDULO DE AUDITORÍA OPERATIVA (CSV/Gráficos)</div>
                </section>
                <section id="sec-admin" class="app-section hidden">
                    <div class="bg-white p-8 rounded-[2rem] text-center text-gray-400 font-bold">PANEL DE ADMINISTRACIÓN (Tiendas/Productos/PINs)</div>
                </section>

            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby86Uyfci6i_hyunbHhVlM2XsTwpo6AtxYedAOZX8gJ6xIIn392pUUR6hxzH4hbJ3nrCA/exec";
        let master = null;
        let user = null;
        let cache = { cat: 'TODOS', sub: 'TODOS' };
        
        // Memoria temporal estricta anclada al UID
        let inputState = {};

        window.onload = async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            await loadMasterData();
        };

        async function loadMasterData() {
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                const d = await r.json();
                if(d.status === 'success') {
                    master = {
                        prods: d.data.productos.slice(1)
                            .filter(x => x[0] && String(x[1]).trim() !== '')
                            .map((x, index) => { // Añadimos 'index' para crear un identificador blindado
                                let isActive = true;
                                if(x[4] === false || String(x[4]).trim().toUpperCase() === 'FALSE') {
                                    isActive = false;
                                }
                                return {
                                    id: String(x[0]).trim(),       // ID Real de la Base de Datos
                                    uid: 'ui_prod_' + index,       // Solución 3: UID Estricto para memoria del Frontend
                                    nom: String(x[1]).trim(),
                                    cat: String(x[2] || 'SIN CATEGORÍA').trim(),
                                    sub: String(x[3] || 'SIN SUBCATEGORÍA').trim(),
                                    act: isActive
                                };
                            }),
                        tiendas: d.data.tiendas.slice(1)
                            .filter(x => x[0])
                            .map(x => ({
                                id: String(x[0]).trim(),
                                nom: String(x[1]).trim(),
                                zona: String(x[2] || '').trim(),
                                pin: String(x[3] || '').trim()
                            }))
                    };

                    const sel = document.getElementById('store-select');
                    sel.innerHTML = master.tiendas.map(t => `<option value="${t.id}">${t.nom} (${t.id})</option>`).join('');
                }
            } catch (e) { alert("Error de conexión crítica con la base de datos."); }
        }

        function toggleLoginUI() {
            const isStore = document.getElementById('user-type').value === 'store';
            document.getElementById('group-store').classList.toggle('hidden', !isStore);
            document.getElementById('group-admin').classList.toggle('hidden', isStore);
        }

        async function handleLogin() {
            document.getElementById('loading').classList.remove('hidden');
            const type = document.getElementById('user-type').value;
            let p = { type };
            if (type === 'store') {
                p.id = document.getElementById('store-select').value;
                p.pin = document.getElementById('store-pin').value;
            } else {
                p.user = document.getElementById('admin-user').value;
                p.pass = document.getElementById('admin-pass').value;
            }

            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', params: p }) });
                const d = await r.json();
                document.getElementById('loading').classList.add('hidden');

                if(d.status === 'success') {
                    user = d.data;
                    initAppStructure();
                } else { 
                    alert("Credenciales Incorrectas"); 
                }
            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                alert("Fallo de comunicación con el servidor.");
            }
        }

        function initAppStructure() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.nombre || user.id;
            document.getElementById('role-display').innerText = user.rol;

            const nav = document.getElementById('app-nav');
            let tabs = `<button onclick="showSec('dash')" id="tab-dash" class="tab-item flex-1 p-4 border-b-4 tab-active">Inicio</button>`;
            
            if(user.rol === 'STORE') {
                tabs += `<button onclick="showSec('input')" id="tab-input" class="tab-item flex-1 p-4 border-b-4 tab-inactive">Registro</button>`;
            } else {
                tabs += `<button onclick="showSec('audit')" id="tab-audit" class="tab-item flex-1 p-4 border-b-4 tab-inactive">Auditoría</button>`;
                if(user.rol === 'ADMIN') {
                    tabs += `<button onclick="showSec('admin')" id="tab-admin" class="tab-item flex-1 p-4 border-b-4 tab-inactive">Sistema</button>`;
                }
            }
            nav.innerHTML = tabs;
            renderDashboard();
        }

        function renderDashboard() {
            const widgets = document.getElementById('dash-widgets');
            const main = document.getElementById('dash-main-content');

            if(user.rol === 'STORE') {
                widgets.innerHTML = `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-green-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Eficiencia</p><p class="text-3xl font-black">--%</p></div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-orange-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Alertas</p><p class="text-3xl font-black">0</p></div>
                `;
                main.innerHTML = `<h3 class="font-black text-xs uppercase text-gray-400 mb-4">Resumen de Hoy</h3><p class="text-sm text-gray-500">No hay datos introducidos hoy aún.</p>`;
            } else {
                widgets.innerHTML = `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-600 col-span-2 text-center">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Tiendas Bajo Supervisión</p>
                        <p class="text-3xl font-black">ZONA: ${user.zonas || 'TOTAL'}</p>
                    </div>
                `;
                main.innerHTML = `<h3 class="font-black text-xs uppercase text-gray-400 mb-4">Estado de Tiendas</h3><div class="space-y-2"><p class="text-sm">Cargando reporte de zona...</p></div>`;
            }
        }

        // --- SISTEMA DE NAVEGACIÓN Y RENDERIZADO AISLADO ---
        function renderCats() {
            const activeProds = master.prods.filter(p => p.act === true);
            const rawCats = [...new Set(activeProds.map(p => p.cat))].sort();
            const cats = ["TODOS", ...rawCats];
            
            const div = document.getElementById('pill-cats');
            div.innerHTML = cats.map(c => `<button onclick="selCat('${c}')" class="px-6 py-3 rounded-xl font-black text-xs uppercase whitespace-nowrap ${cache.cat === c ? 'pill-selected' : 'pill-default'}">${c}</button>`).join('');
            
            if(cache.cat) renderSubs();
        }

        function selCat(c) {
            cache.cat = c; 
            cache.sub = 'TODOS'; 
            renderCats();
            document.getElementById('pill-subs').classList.remove('hidden');
            renderSubs();
        }

        function renderSubs() {
            const activeProds = master.prods.filter(p => p.act === true && (cache.cat === 'TODOS' || p.cat === cache.cat));
            const rawSubs = [...new Set(activeProds.map(p => p.sub))].sort();
            const subs = ["TODOS", ...rawSubs];
            
            const div = document.getElementById('pill-subs');
            div.innerHTML = subs.map(s => `<button onclick="selSub('${s}')" class="px-5 py-2 rounded-xl font-bold text-[10px] uppercase whitespace-nowrap ${cache.sub === s ? 'pill-selected' : 'pill-default'}">${s}</button>`).join('');
            
            renderProds();
        }

        function selSub(s) {
            cache.sub = s;
            renderSubs();
            renderProds();
        }

        function renderProds() {
            const list = master.prods.filter(p => 
                p.act === true && 
                (cache.cat === 'TODOS' || p.cat === cache.cat) && 
                (cache.sub === 'TODOS' || p.sub === cache.sub)
            );
            
            const div = document.getElementById('prod-grid');
            
            if(list.length === 0) {
                div.innerHTML = '<p class="text-center text-gray-400 font-bold py-8">No hay productos activos en esta selección.</p>';
                return;
            }

            // Utilizamos p.uid en lugar de p.id para blindar la memoria
            div.innerHTML = list.map(p => `
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex justify-between items-center transition-all hover:border-blue-200">
                    <div class="flex-1 pr-2">
                        <p class="font-black text-slate-800 leading-tight uppercase text-sm">${p.nom}</p>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">${p.cat} / ${p.sub}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="val('${p.uid}',-1)" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-xl font-black text-2xl text-gray-500 transition-colors">-</button>
                        <input type="number" id="v-${p.uid}" value="${inputState[p.uid] || 0}" oninput="updateState('${p.uid}', this.value)" class="w-12 text-center font-black text-2xl text-blue-600 bg-transparent outline-none m-0 p-0 border-none">
                        <button onclick="val('${p.uid}',1)" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-xl font-black text-2xl text-gray-500 transition-colors">+</button>
                    </div>
                </div>
            `).join('');
        }

        // --- MANEJO ESTRICTO DEL ESTADO (MEMORIA INDEPENDIENTE) ---
        function updateState(uid, value) {
            inputState[uid] = Math.max(0, parseInt(value) || 0);
        }

        function val(uid, d) {
            const i = document.getElementById('v-'+uid);
            const newValue = Math.max(0, parseInt(i.value || 0) + d);
            i.value = newValue;
            inputState[uid] = newValue; // Guardado ciego y seguro en el UID
        }

        function updateInputView() {
            const isMerma = document.getElementById('input-type').value === 'merma';
            document.getElementById('area-turno').classList.toggle('hidden', isMerma);
        }

        function showSec(id) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-'+id).classList.remove('hidden');
            
            document.querySelectorAll('.tab-item').forEach(t => {
                t.classList.replace('tab-active', 'tab-inactive');
                t.classList.remove('border-blue-600', 'text-blue-600');
            });
            const active = document.getElementById('tab-'+id);
            active.classList.replace('tab-inactive', 'tab-active');
            
            if(id === 'input') renderCats();
        }

        async function processSave() {
            // Reconstruimos los datos mapeando el UID de vuelta al ID real de la base de datos
            const items = master.prods.map(p => ({
                id: p.id,
                v: inputState[p.uid] || 0
            })).filter(x => x.v > 0);

            if(items.length === 0) return alert("No has introducido ninguna cantidad.");
            
            document.getElementById('loading').classList.remove('hidden');
            const payload = {
                action: 'saveDaily',
                params: {
                    fecha: document.getElementById('input-date').value,
                    type: document.getElementById('input-type').value,
                    turno: document.getElementById('input-turno').value,
                    tiendaId: user.id,
                    items: items.map(x => ({prodId: x.id, val: x.v})) // Enviamos el ID real a Google
                }
            };

            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const d = await r.json();
                if(d.status === 'success') {
                    alert("¡DATOS GUARDADOS CORRECTAMENTE!");
                    inputState = {}; 
                    location.reload();
                }
            } catch (e) { 
                alert("Error al guardar en la base de datos."); 
            }
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
</html>
