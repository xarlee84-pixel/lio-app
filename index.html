<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIO APP - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pill-selected { @apply bg-blue-600 text-white shadow-md scale-105 border-2 border-blue-600 transition-all; }
        .pill-default { @apply bg-white text-gray-700 shadow-sm border-2 border-gray-300 hover:border-blue-400 hover:text-blue-600 transition-all; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .tab-active { @apply border-blue-600 text-blue-600 font-black; }
        .tab-inactive { @apply border-transparent text-gray-400 font-bold; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans antialiased">

    <div id="loading" class="hidden fixed inset-0 bg-white/90 z-[2000] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-16 h-16 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <p class="font-black text-blue-900 uppercase tracking-widest text-[10px]" id="loading-text">Conectando...</p>
    </div>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md">
            <div class="text-center mb-8"><h1 class="text-5xl font-black text-slate-900 italic tracking-tighter">LIO</h1><div class="h-1 w-12 bg-blue-600 mx-auto mt-2 rounded-full"></div></div>
            <div class="space-y-4">
                <select id="user-type" onchange="toggleLoginUI()" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold text-gray-700 outline-none">
                    <option value="store">ACCESO TIENDA</option><option value="admin">ACCESO MANAGEMENT</option>
                </select>
                <div id="group-store" class="space-y-4">
                    <select id="store-select" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold text-gray-700 outline-none"></select>
                    <input type="password" id="store-pin" inputmode="numeric" placeholder="PIN" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 text-center text-3xl font-black tracking-[0.5em] outline-none">
                </div>
                <div id="group-admin" class="hidden space-y-4">
                    <input type="text" id="admin-user" placeholder="USUARIO" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold outline-none text-center uppercase">
                    <input type="password" id="admin-pass" placeholder="PASSWORD" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-2 ring-gray-100 font-bold outline-none text-center">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-xs uppercase tracking-widest mt-4">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white p-6 border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <div><p id="role-display" class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-1"></p><h2 id="user-display" class="font-black text-xl text-slate-800 italic leading-none"></h2></div>
            <button onclick="location.reload()" class="bg-gray-50 p-3 rounded-2xl text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
        </header>
        <nav id="app-nav" class="bg-white border-b flex justify-around font-black text-[9px] uppercase tracking-widest sticky top-[89px] z-40 shadow-sm"></nav>

        <main class="flex-1 p-4 overflow-y-auto max-w-4xl mx-auto w-full pb-32">
            <div id="content-area">
                <section id="sec-dash" class="app-section space-y-6">
                    <div id="dash-manager-actions" class="hidden"></div>
                    <div id="dash-widgets" class="grid grid-cols-2 gap-4"></div>
                    <div id="dash-main-content" class="space-y-6"></div>
                </section>
                
                <section id="sec-input" class="app-section hidden space-y-6">
                    <div class="bg-white p-4 rounded-3xl border flex gap-2"><input type="date" id="input-date" class="flex-1 font-bold outline-none uppercase text-xs"><select id="input-type" onchange="updateInputView()" class="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl font-black text-[10px]"><option value="prod">PRODUCCIÓN</option><option value="merma">MERMA</option></select></div>
                    <div id="area-turno" class="bg-white p-4 rounded-3xl border"><p class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Turno</p><select id="input-turno" class="w-full font-bold outline-none bg-transparent text-sm"><option value="Obrador">OBRADOR</option><option value="Mediodía">MEDIODÍA</option><option value="Tarde">TARDE</option></select></div>
                    <div id="prod-grid" class="space-y-3"></div>
                    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-white via-white to-transparent pointer-events-none"><button onclick="processSave()" class="w-full max-w-4xl mx-auto block bg-slate-900 text-white font-black py-5 rounded-3xl shadow-2xl active:scale-95 transition-all text-xs uppercase tracking-widest pointer-events-auto">Confirmar Registro</button></div>
                </section>

                <section id="sec-audit" class="app-section hidden space-y-6">
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <h3 class="font-black text-slate-800 uppercase text-[10px] mb-4">Auditoría</h3>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Desde</label><input type="date" id="audit-start" class="w-full p-3 bg-gray-50 rounded-xl font-bold text-[10px] outline-none"></div>
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Hasta</label><input type="date" id="audit-end" class="w-full p-3 bg-gray-50 rounded-xl font-bold text-[10px] outline-none"></div>
                        </div>
                        <button onclick="generateAuditReport()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl text-[10px] uppercase">Ejecutar</button>
                    </div>
                    <div id="audit-results-container" class="hidden space-y-6">
                        <div class="grid grid-cols-3 gap-3 text-center"><div class="bg-white p-4 rounded-2xl border"><p class="text-[8px] font-black text-gray-400 uppercase">P.</p><p id="kpi-prod" class="text-lg font-black text-blue-600">0</p></div><div class="bg-white p-4 rounded-2xl border"><p class="text-[8px] font-black text-gray-400 uppercase">M.</p><p id="kpi-merma" class="text-lg font-black text-red-500">0</p></div><div class="bg-white p-4 rounded-2xl border"><p class="text-[8px] font-black text-gray-400 uppercase">%</p><p id="kpi-porc" class="text-lg font-black text-slate-800">0%</p></div></div>
                        <div class="bg-white p-6 rounded-[2rem] border"><div class="h-64 w-full"><canvas id="auditChartStore"></canvas></div></div>
                    </div>
                </section>

                <section id="sec-crm" class="app-section hidden space-y-6">
                    <div id="crm-actions"></div>
                    <div id="crm-list" class="space-y-4"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby86Uyfci6i_hyunbHhVlM2XsTwpo6AtxYedAOZX8gJ6xIIn392pUUR6hxzH4hbJ3nrCA/exec";
        let master = null, user = null, dashData = null, crmCache = [], inputState = {};

        window.onload = async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            await loadMasterData();
        };

        async function loadMasterData() {
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                const d = await r.json();
                if(d.status === 'success') {
                    master = {
                        prods: d.data.productos.slice(1).filter(x => x[0]).map((x, i) => ({ id: String(x[0]), uid: 'ui_'+i, nom: String(x[1]), cat: String(x[2]), act: x[4] !== false })),
                        tiendas: d.data.tiendas.slice(1).filter(x => x[0]).map(x => ({ id: String(x[0]), nom: String(x[1]), zona: String(x[2]), pin: String(x[3]) })),
                        config: d.data.config
                    };
                    document.getElementById('store-select').innerHTML = master.tiendas.map(t => `<option value="${t.id}">${t.nom}</option>`).join('');
                }
            } catch (e) {}
        }

        async function handleLogin() {
            const l = document.getElementById('loading'); l.classList.remove('hidden');
            const type = document.getElementById('user-type').value; let p = { type };
            if (type === 'store') { p.id = document.getElementById('store-select').value; p.pin = document.getElementById('store-pin').value; } 
            else { p.user = document.getElementById('admin-user').value; p.pass = document.getElementById('admin-pass').value; }
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', params: p }) }), d = await r.json();
                if(d.status === 'success') {
                    user = d.data; await fetchDashboard(); initAppStructure();
                } else alert("Error."); 
            } catch (e) {} l.classList.add('hidden');
        }

        async function fetchDashboard() {
            const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboardData', params: { userId: user.id, rol: user.rol, zonas: user.zonas } }) }), d = await r.json(); 
            if(d.status === 'success') dashData = d.data;
        }

        function initAppStructure() {
            document.getElementById('login-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('role-display').innerText = user.rol.replace(/_/g, ' '); 
            document.getElementById('user-display').innerText = "Hola, " + (user.nombre || user.id);
            let tabs = `<button onclick="showSec('dash')" id="tab-dash" class="tab-item flex-1 p-4 border-b-4 tab-active transition-colors">Inicio</button>`;
            if(user.rol === 'STORE') {
                tabs += `<button onclick="showSec('input')" id="tab-input" class="tab-item flex-1 p-4 border-b-4 tab-inactive transition-colors">Registro</button>`;
                tabs += `<button onclick="showSec('audit')" id="tab-audit" class="tab-item flex-1 p-4 border-b-4 tab-inactive transition-colors">Auditoría</button>`;
            } else {
                tabs += `<button onclick="showSec('audit')" id="tab-audit" class="tab-item flex-1 p-4 border-b-4 tab-inactive transition-colors">Auditoría</button>`;
                tabs += `<button onclick="showSec('crm')" id="tab-crm" class="tab-item flex-1 p-4 border-b-4 tab-inactive transition-colors">Gestión</button>`;
            }
            document.getElementById('app-nav').innerHTML = tabs;
            renderDashboard();
        }

        function renderDashboard() {
            const w = document.getElementById('dash-widgets'), m = document.getElementById('dash-main-content'), actions = document.getElementById('dash-manager-actions');
            if(user.rol === 'STORE') {
                w.innerHTML = `<div class="bg-white p-5 rounded-3xl border"><p class="text-[9px] text-gray-400 uppercase font-bold">Eficiencia</p><p class="text-3xl font-black text-blue-600">${dashData.eficiencia}%</p></div><div class="bg-white p-5 rounded-3xl border"><p class="text-[9px] text-gray-400 uppercase font-bold">Alertas</p><p class="text-3xl font-black ${dashData.pendientes>0?'text-red-500':'text-green-500'}">${dashData.pendientes}</p></div>`;
                m.innerHTML = dashData.listaPendientes.length > 0 ? `<div class="bg-red-50 p-6 rounded-[2rem] border border-red-100"><p class="text-[10px] font-black text-red-700 uppercase mb-3">Pendientes</p><ul class="text-[10px] text-red-600 font-bold space-y-2">${dashData.listaPendientes.map(d=>`<li>• ${d.label}</li>`).join('')}</ul></div>` : '<p class="text-center py-10 font-black text-gray-400 text-[10px] uppercase">¡Todo al día!</p>';
            } else {
                actions.classList.remove('hidden');
                actions.innerHTML = `<button onclick="copyAllTasks()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg mb-6">Copiar Resumen de Zona</button>`;
                w.innerHTML = `<div class="bg-white p-5 rounded-3xl col-span-2 flex justify-between border shadow-sm"><div><p class="text-[9px] text-gray-400 uppercase font-bold">Zona</p><p class="text-xl font-black uppercase italic">${dashData.zonaNombre}</p></div><div class="text-right"><p class="text-[9px] text-gray-400 uppercase font-bold">Alertas</p><p class="text-3xl font-black text-red-500">${dashData.pendientes}</p></div></div>`;
                m.innerHTML = `<div class="bg-white p-6 rounded-[2rem] border shadow-sm"><h3 class="font-black text-[9px] text-gray-400 mb-4 uppercase tracking-widest">Alertas Activas</h3><div class="space-y-4">` + dashData.listaPendientes.map(t => `
                    <div class="border border-red-100 rounded-2xl relative">
                        <div class="bg-red-50 p-4 font-black text-[10px] text-red-900 uppercase pr-12">${t.tienda}</div>
                        <button onclick="copySpecificStore('${t.id}')" class="absolute top-3 right-3 p-2 bg-white rounded-lg shadow-sm border border-red-100 text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2.5"></path></svg></button>
                        <div class="p-4"><ul class="text-[10px] text-red-600 font-bold space-y-1">${t.mesesFaltantes.map(m=>`<li>🔥 FALTA MES: ${fmtMonthYear(m)}</li>`).join('')}${t.dias.map(d=>`<li>• ${d.label}</li>`).join('')}</ul></div>
                    </div>`).join('') + `</div></div>`;
            }
        }

        async function loadCRMData() {
            const list = document.getElementById('crm-list'); list.innerHTML = '<div class="text-center py-12 text-[10px] font-black uppercase text-gray-400 italic">Cargando métricas...</div>';
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getManagerCRM', params: { rol: user.rol, zonas: user.zonas } }) }), d = await r.json();
                if(d.status === 'success') {
                    crmCache = d.data;
                    document.getElementById('crm-actions').innerHTML = `<button onclick="copyAllTasks()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg mb-6">Copiar Resumen de Zona</button>`;
                    renderCRMList(d.data);
                }
            } catch (e) {}
        }

        function renderCRMList(tiendas) {
            document.getElementById('crm-list').innerHTML = tiendas.map(t => `
                <div class="bg-white border rounded-3xl overflow-hidden shadow-sm">
                    <div class="p-5 cursor-pointer flex justify-between items-center bg-gray-50/50" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <div class="flex items-center gap-3"><p class="font-black text-xs uppercase italic">${t.nombre}</p></div>
                        <div class="flex items-center gap-3"><span class="text-[10px] font-black ${parseFloat(t.eficiencia)>15?'text-red-500':'text-green-600'}">${t.eficiencia}%</span><svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3"></path></svg></div>
                    </div>
                    <div class="hidden p-6 border-t space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                <p class="text-[8px] font-black text-blue-800 uppercase mb-2">Top 5 Merma (unidades)</p>
                                <ul class="text-[9px] font-bold text-blue-900 space-y-1">${t.topMerma.map(p=>`<li>${p.nom}: <span class="text-red-500">${p.merma}</span></li>`).join('')}</ul>
                            </div>
                            <div class="bg-red-50 p-4 rounded-2xl border border-red-100 relative">
                                <button onclick="copySpecificStore('${t.id}')" class="absolute top-2 right-2 text-red-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2" stroke-width="2.5"></path></svg></button>
                                <p class="text-[8px] font-black text-red-800 uppercase mb-2">Pendientes</p>
                                <ul class="text-[9px] font-bold text-red-600 space-y-1">${t.mesesPendientes.map(m=>`<li>🔥 Cierre: ${fmtMonthYear(m)}</li>`).join('')}${t.tareasPendientes.map(d=>`<li>• ${fmtDate(d.f)}</li>`).join('')}</ul>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-2xl border">
                            <input type="text" id="pin-${t.id}" value="${t.pin}" class="flex-1 bg-transparent font-black text-center text-blue-600 text-sm outline-none tracking-widest pl-4">
                            <button onclick="navigator.clipboard.writeText(document.getElementById('pin-${t.id}').value);alert('Copiado');" class="bg-white p-3 rounded-xl border flex items-center justify-center h-10 w-10">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"></path></svg>
                            </button>
                            <button onclick="saveNewPIN('${t.id}')" class="bg-blue-600 text-white font-black px-4 h-10 rounded-xl text-[9px] uppercase">Guardar</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function formatStoreMessage(t) {
            let msg = `⚠️ *AVISO TIENDA: ${t.nombre.toUpperCase()}* ⚠️\nPor favor, actualizad los datos en el sistema:\n\n`;
            if(t.mesesPendientes && t.mesesPendientes.length > 0) msg += `🔥 Meses por cerrar: ${t.mesesPendientes.map(m=>fmtMonthYear(m)).join(', ')}\n\n`;
            t.tareasPendientes.forEach(d => { msg += `📅 ${d.label} (${d.motivo})\n`; });
            return msg;
        }

        function copySpecificStore(id) {
            let t = (crmCache.length > 0 ? crmCache : dashData.listaPendientes).find(x => x.id == id);
            if(!t) return;
            // Si viene del Dashboard, hay que asegurar que tiene el nombre correcto (dashData lo llama 'tienda')
            if(!t.nombre) t.nombre = t.tienda; 
            if(!t.tareasPendientes) t.tareasPendientes = t.dias;
            if(!t.mesesPendientes) t.mesesPendientes = t.mesesFaltantes;
            navigator.clipboard.writeText(formatStoreMessage(t)); alert("Aviso copiado.");
        }

        function copyAllTasks() {
            let fullMsg = `*RESUMEN PENDIENTES ZONA ${user.zonas.toUpperCase()}*\n\n`;
            let target = crmCache.length > 0 ? crmCache : dashData.listaPendientes;
            target.filter(t => (t.tareasPendientes?.length || t.dias?.length) > 0).forEach(t => {
                if(!t.nombre) t.nombre = t.tienda; if(!t.tareasPendientes) t.tareasPendientes = t.dias;
                if(!t.mesesPendientes) t.mesesPendientes = t.mesesFaltantes;
                fullMsg += formatStoreMessage(t) + `\n-------------------\n\n`;
            });
            navigator.clipboard.writeText(fullMsg); alert("Resumen de zona copiado.");
        }

        async function saveNewPIN(tId) {
            let nP = document.getElementById(`pin-${tId}`).value; if(!nP) return;
            const l = document.getElementById('loading'); l.classList.remove('hidden');
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStorePin', params: { tiendaId: tId, newPin: nP, rol: user.rol } }) }); alert("OK"); } catch(e) {} l.classList.add('hidden');
        }

        function showSec(id) { 
            document.querySelectorAll('.app-section').forEach(s => s.classList.add('hidden')); 
            document.getElementById('sec-'+id).classList.remove('hidden'); 
            document.querySelectorAll('.tab-item').forEach(t => t.classList.replace('tab-active', 'tab-inactive')); 
            document.getElementById('tab-'+id).classList.replace('tab-inactive', 'tab-active'); 
            if(id === 'input') renderProds(); if(id === 'crm') loadCRMData(); 
        }

        function renderProds() {
            document.getElementById('prod-grid').innerHTML = master.prods.filter(p => p.act).map(p => `<div class="bg-white p-5 rounded-[2rem] shadow-sm flex justify-between items-center border"><div class="flex-1 pr-2"><p class="font-black text-xs uppercase">${p.nom}</p></div><div class="flex gap-3"><button onclick="val('${p.uid}',-1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black">-</button><input type="number" id="v-${p.uid}" value="${inputState[p.uid]||0}" oninput="inputState['${p.uid}']=parseInt(this.value)||0" class="w-8 text-center font-black text-blue-600 bg-transparent outline-none"><button onclick="val('${p.uid}',1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black">+</button></div></div>`).join('');
        }
        function val(uid, d) { let i = document.getElementById('v-'+uid), n = Math.max(0, parseInt(i.value||0)+d); i.value = n; inputState[uid] = n; }
        function updateInputView() { document.getElementById('area-turno').classList.toggle('hidden', document.getElementById('input-type').value==='merma'); }

        async function processSave() {
            const items = master.prods.map(p => ({ id: p.id, v: inputState[p.uid]||0 })).filter(x => x.v>0); if(!items.length) return alert("Sin datos.");
            const l = document.getElementById('loading'); l.classList.remove('hidden');
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveDaily', params: { fecha: document.getElementById('input-date').value, type: document.getElementById('input-type').value, turno: document.getElementById('input-turno').value, tiendaId: user.id, items: items.map(x=>({prodId:x.id, val:x.v})) } }) }), d = await r.json();
                if(d.status === 'success') { alert("Hecho"); inputState = {}; await fetchDashboard(); renderDashboard(); showSec('dash'); }
            } catch(e) {} l.classList.add('hidden');
        }
    </script>
</body>
</html>
