<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIO APP v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-step { @apply transition-all duration-200 transform active:scale-95; }
        .selected-pill { @apply bg-blue-700 text-white shadow-md; }
        .unselected-pill { @apply bg-gray-100 text-gray-500 hover:bg-gray-200; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center text-white font-bold">CARGANDO...</div>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-900 to-black">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <h1 class="text-4xl font-black text-center mb-2 text-blue-900 italic">LIO</h1>
            <p class="text-center text-gray-400 text-xs font-bold uppercase tracking-widest mb-8">Management System</p>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Tipo de Perfil</label>
                    <select id="user-type" onchange="toggleLoginUI()" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold">
                        <option value="store">TIENDA (PIN)</option>
                        <option value="admin">MANAGEMENT (ZONA/ADMIN)</option>
                    </select>
                </div>

                <div id="group-store">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Seleccionar Punto de Venta</label>
                    <select id="store-select" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-600 outline-none font-bold"></select>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mt-4 block">PIN de Acceso</label>
                    <input type="password" id="store-pin" inputmode="numeric" placeholder="****" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-600 outline-none text-center text-3xl tracking-[1em]">
                </div>

                <div id="group-admin" class="hidden">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Usuario</label>
                    <input type="text" id="admin-user" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 mb-4">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Contraseña</label>
                    <input type="password" id="admin-pass" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200">
                </div>

                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all btn-step">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white p-4 border-b flex justify-between items-center shadow-sm sticky top-0 z-40">
            <div>
                <p id="role-display" class="text-[10px] font-black text-blue-600 uppercase leading-none"></p>
                <h2 id="user-display" class="font-black text-xl text-gray-800 uppercase italic"></h2>
            </div>
            <button onclick="location.reload()" class="bg-gray-100 p-3 rounded-2xl text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
        </header>

        <nav class="bg-white border-b flex text-center font-black text-[10px] uppercase tracking-tighter">
            <button onclick="changeTab('dash')" id="btn-tab-dash" class="flex-1 p-4 border-b-4 border-blue-600 text-blue-600">Dashboard</button>
            <button onclick="changeTab('input')" id="btn-tab-input" class="flex-1 p-4 border-b-4 border-transparent text-gray-400">Registro</button>
            <button onclick="changeTab('audit')" id="btn-tab-audit" class="flex-1 p-4 border-b-4 border-transparent text-gray-400 hidden">Auditoría</button>
        </nav>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <section id="sec-dash" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Estado Merma</p>
                        <p class="text-3xl font-black text-green-500">8.2%</p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Pendientes</p>
                        <p class="text-3xl font-black text-orange-500">0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="font-black text-gray-800 uppercase mb-4 text-sm">Resumen Diario</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="text-gray-400 border-b">
                                    <th class="pb-2">PRODUCTO</th>
                                    <th class="pb-2 text-center">PROD</th>
                                    <th class="pb-2 text-center">MERMA</th>
                                    <th class="pb-2 text-right">%</th>
                                </tr>
                            </thead>
                            <tbody id="dash-table-body" class="divide-y divide-gray-50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-input" class="hidden space-y-6">
                <div class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-blue-600 flex gap-4">
                    <input type="date" id="input-date" class="flex-1 font-bold text-gray-700 outline-none">
                    <select id="input-type" onchange="updateTurnoUI()" class="font-black text-blue-600 bg-blue-50 px-4 rounded-xl outline-none">
                        <option value="prod">PRODUCCIÓN</option>
                        <option value="merma">MERMA</option>
                    </select>
                </div>

                <div id="step-turno">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">1. Seleccionar Turno</p>
                    <select id="input-turno" class="w-full p-4 bg-white rounded-2xl shadow-sm border-none font-bold text-gray-700">
                        <option value="Obrador">OBRADOR (Principal)</option>
                        <option value="Mediodía">MEDIODÍA</option>
                        <option value="Tarde">TARDE</option>
                    </select>
                </div>

                <div id="step-category">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">2. Categoría</p>
                    <div id="cat-list" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
                </div>

                <div id="step-subcategory" class="hidden">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">3. Subcategoría</p>
                    <div id="subcat-list" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
                </div>

                <div id="step-products" class="hidden space-y-3 pb-32">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">4. Cantidades</p>
                    <div id="prod-list" class="space-y-3"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white via-white to-transparent z-40">
                    <button onclick="saveData()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-2xl btn-step">CONFIRMAR Y GUARDAR</button>
                </div>
            </section>

        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby86Uyfci6i_hyunbHhVlM2XsTwpo6AtxYedAOZX8gJ6xIIn392pUUR6hxzH4hbJ3nrCA/exec";
        let masterData = null;
        let currentUser = null;
        let selCat = null;
        let selSub = null;

        window.onload = async () => {
            document.getElementById('input-date').valueAsDate = new Date();
            // Carga silenciosa de datos iniciales
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                const json = await res.json();
                if(json.status === 'success') {
                    masterData = {
                        productos: json.data.productos.slice(1).map(r => ({id: r[0], nom: r[1], cat: r[2], sub: r[3], active: r[4]})),
                        tiendas: json.data.tiendas.slice(1).map(r => ({id: r[0], nom: r[1], pin: r[3]}))
                    };
                    populateStores();
                }
            } catch (e) { console.error("Error pre-carga", e); }
        };

        function toggleLoginUI() {
            const isStore = document.getElementById('user-type').value === 'store';
            document.getElementById('group-store').classList.toggle('hidden', !isStore);
            document.getElementById('group-admin').classList.toggle('hidden', isStore);
        }

        function populateStores() {
            const select = document.getElementById('store-select');
            select.innerHTML = masterData.tiendas.map(t => `<option value="${t.id}">${t.nom} (${t.id})</option>`).join('');
        }

        async function handleLogin() {
            const type = document.getElementById('user-type').value;
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');

            let params = { type };
            if (type === 'store') {
                params.id = document.getElementById('store-select').value;
                params.pin = document.getElementById('store-pin').value;
            } else {
                params.user = document.getElementById('admin-user').value;
                params.pass = document.getElementById('admin-pass').value;
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', params }) });
                const json = await res.json();
                overlay.classList.add('hidden');

                if(json.status === 'success') {
                    currentUser = json.data;
                    initApp();
                } else {
                    alert("Credenciales incorrectas");
                }
            } catch (e) { alert("Error de comunicación. Revisa tu conexión."); overlay.classList.add('hidden'); }
        }

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.nombre || currentUser.id;
            document.getElementById('role-display').innerText = currentUser.rol;
            
            if(currentUser.rol !== 'STORE') {
                document.getElementById('btn-tab-audit').classList.remove('hidden');
            }
            renderCategories();
        }

        // --- LÓGICA DE REGISTRO PASO A PASO ---
        function renderCategories() {
            const cats = [...new Set(masterData.productos.map(p => p.cat))];
            document.getElementById('cat-list').innerHTML = cats.map(c => `
                <button onclick="selectCategory('${c}')" id="cat-${c}" class="btn-step px-6 py-3 rounded-2xl font-black text-xs uppercase whitespace-nowrap ${selCat === c ? 'selected-pill' : 'unselected-pill'}">${c}</button>
            `).join('');
        }

        function selectCategory(c) {
            selCat = c;
            selSub = null;
            renderCategories();
            document.getElementById('step-subcategory').classList.remove('hidden');
            document.getElementById('step-products').classList.add('hidden');
            renderSubcategories();
        }

        function renderSubcategories() {
            const subs = [...new Set(masterData.productos.filter(p => p.cat === selCat).map(p => p.sub))];
            document.getElementById('subcat-list').innerHTML = subs.map(s => `
                <button onclick="selectSubcategory('${s}')" id="sub-${s}" class="btn-step px-6 py-3 rounded-2xl font-black text-[10px] uppercase whitespace-nowrap ${selSub === s ? 'selected-pill' : 'unselected-pill'}">${s}</button>
            `).join('');
        }

        function selectSubcategory(s) {
            selSub = s;
            renderSubcategories();
            document.getElementById('step-products').classList.remove('hidden');
            renderProducts();
        }

        function renderProducts() {
            const prods = masterData.productos.filter(p => p.cat === selCat && p.sub === selSub && (p.active === true || p.active === "TRUE"));
            document.getElementById('prod-list').innerHTML = prods.map(p => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <p class="font-black text-lg text-gray-800 leading-tight">${p.nom}</p>
                        <p class="text-[10px] font-bold text-gray-400 uppercase italic">${p.sub}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="adj('${p.id}', -1)" class="w-12 h-12 bg-gray-50 rounded-2xl font-black text-2xl text-gray-400 border border-gray-100">-</button>
                        <input type="number" id="val-${p.id}" value="0" class="w-12 text-center font-black text-2xl text-blue-600 bg-transparent outline-none">
                        <button onclick="adj('${p.id}', 1)" class="w-12 h-12 bg-gray-50 rounded-2xl font-black text-2xl text-gray-400 border border-gray-100">+</button>
                    </div>
                </div>
            `).join('');
        }

        function adj(id, delta) {
            const el = document.getElementById('val-'+id);
            el.value = Math.max(0, parseInt(el.value) + delta);
        }

        function updateTurnoUI() {
            const isMerma = document.getElementById('input-type').value === 'merma';
            document.getElementById('step-turno').classList.toggle('hidden', isMerma);
        }

        function changeTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-'+tab).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('border-blue-600', 'text-blue-600');
                b.classList.add('border-transparent', 'text-gray-400');
            });
            document.getElementById('btn-tab-'+tab).classList.add('border-blue-600', 'text-blue-600');
        }

        async function saveData() {
            const items = masterData.productos.map(p => {
                const v = parseInt(document.getElementById('val-'+p.id)?.value || 0);
                return { prodId: p.id, val: v };
            }).filter(i => i.val > 0);

            if(items.length === 0) return alert("Introduce cantidades");

            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');

            const payload = {
                action: 'saveDaily',
                params: {
                    fecha: document.getElementById('input-date').value,
                    type: document.getElementById('input-type').value,
                    turno: document.getElementById('input-turno').value,
                    tiendaId: currentUser.id,
                    items
                }
            };

            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const json = await res.json();
            overlay.classList.add('hidden');

            if(json.status === 'success') {
                alert("DATOS GUARDADOS CON ÉXITO");
                location.reload();
            }
        }
    </script>
</body>
</html>
